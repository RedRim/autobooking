services:
  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: autobooking_back_prod
    env_file:
      - ./back/.env
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"
    restart: unless-stopped
    volumes:
      - ./back/data:/app/data

  front:
    build:
      context: ./front
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: /api
    container_name: autobooking_front_prod
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: autobooking_gateway_prod
    depends_on:
      - back
      - front
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
