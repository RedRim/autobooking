server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ^~ — жёстко выше SPA fallback, иначе /api/* может уйти в try_files → index.html (в ответе HTML вместо JSON).
    # Если перед контейнером ещё nginx/Caddy на хосте — там тоже нужен proxy /api → :8000 (или на этот контейнер с путём /api).
    location ^~ /api/ {
        proxy_pass http://host.docker.internal:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
